<h2>Restablecer contraseña</h2>

<form (ngSubmit)="onSubmit()">
  <div>
    <label>Nueva contraseña</label>
    <input
      type="password"
      name="password"
      [(ngModel)]="password"
      required
    />
  </div>

  <button type="submit" [disabled]="loading()">
    {{ loading() ? 'Guardando...' : 'Cambiar contraseña' }}
  </button>
</form>

@if (message) {
  <p>{{ message }}</p>
}

@if (error) {
  <p>{{ error }}</p>
}
